# type = "slack_bot"
# min_severity = "warning"
# streams = ["alerts", "reports"]
# token_env = "SLACK_BOT_TOKEN"
# default_channel = "#campaign-alerts"
# report_channel = "#automation-alerts"     # run summary + cycle reports land here
# [notify.org_channels]                       # optional per-org alert routing
# "tatacapital-housing.com" = "#tatacap-alerts"
# [notify.channels]                           # optional per-campaign alert routing
# "VFD-PAPQ-32d48eab-6c68" = "#chola-tracking"
